<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<mat-sidenav-container class="mainWrapper blue_theme light-theme"
                        autoFocus
                        dir="ltr">

  <!-- ================= SIDEBAR ================= -->
  <mat-sidenav
    #leftsidenav
    class="sidebarNav"
    [mode]="isOver ? 'over' : 'side'"
    [opened]="!isOver"
    (openedChange)="onSidenavOpenedChange($event)"
    (closedStart)="onSidenavClosedStart()">

    <div class="flex-layout">

      <!-- Sidebar component -->
      <app-sidebar
        (toggleMobileNav)="leftsidenav.toggle()"
        [showToggle]="isOver">
      </app-sidebar>

      <!-- Navigation -->
      <ng-scrollbar class="position-relative" style="height: 100%">

        <mat-nav-list class="sidebar-list">

          @for(item of navItems; track item) {
            <app-nav-item
              [item]="item"
              (notify)="leftsidenav.toggle()">
            </app-nav-item>
          }

        </mat-nav-list>

      </ng-scrollbar>

    </div>
  </mat-sidenav>

  <!-- ================= MAIN CONTENT ================= -->
  <mat-sidenav-content class="contentWrapper" #content>

    <main class="pageWrapper maxWidth">

      <!-- 🔥 FIX: PASS DRAWER TO HEADER -->
      <app-header
        [drawer]="leftsidenav">
      </app-header>

      <div class="contentWrapper">
        <router-outlet></router-outlet>
      </div>

    </main>

<div style="color:red; font-family: 'Inter', sans-serif;"
     class="p-16 p-t-8 p-b-30 text-center">
  ERP Systems Solution
</div>
  </mat-sidenav-content>

</mat-sidenav-container>
