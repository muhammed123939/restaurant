<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<mat-sidenav-container class="mainWrapper blue_theme light-theme" autoFocus dir="ltr">

  <!-- ================= SIDEBAR ================= -->
<mat-sidenav
  #leftsidenav
  class="sidebarNav"
  [mode]="isOver ? 'over' : 'side'"
  [opened]="!isOver">>


    <div class="flex-layout">

      <!-- Sidebar component -->
      <app-sidebar (toggleMobileNav)="leftsidenav.toggle()" [showToggle]="isOver">
      </app-sidebar>

      <!-- Navigation -->
      <ng-scrollbar class="position-relative" style="height: 100%">

        <mat-nav-list class="sidebar-list">

          @for(item of navItems; track item) {
          <app-nav-item [item]="item" (notify)="leftsidenav.toggle()">
          </app-nav-item>
          }

        </mat-nav-list>

      </ng-scrollbar>

    </div>
  </mat-sidenav>

  <!-- ================= MAIN CONTENT ================= -->
  <mat-sidenav-content class="contentWrapper" #content>

    <main class="pageWrapper maxWidth">

      <!-- 🔥 FIX: PASS DRAWER TO HEADER -->
<app-header [drawer]="leftsidenav"></app-header>
      <div class="contentWrapper">
        <router-outlet></router-outlet>
      </div>


    </main>
<div class="mobile-bottom-nav" [class.show]="isMobileScreen">

  @for (item of navItems; track item) {
    <a
      class="mobile-nav-item"
      [routerLink]="item.route"
      routerLinkActive="active"
      (click)="leftsidenav.close()"
    >
<i-tabler
  *ngIf="item.iconName"
  [name]="item.iconName"
  class="icon"
></i-tabler>

      <!-- <span class="label">
        {{ item.displayName }}
      </span> -->
    </a>
  }

</div>
  </mat-sidenav-content>

</mat-sidenav-container>
