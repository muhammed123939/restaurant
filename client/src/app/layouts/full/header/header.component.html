<style>
/* =========================================================
   TOPBAR BASE
========================================================= */
.topbar {
  background: #ffffff;
  height: 64px;
  padding: 0 14px;

  display: flex;
  align-items: center;
  gap: 10px;

  position: sticky;
  top: 0;
  z-index: 1000;

  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}

/* =========================================================
   MOBILE MENU BUTTON
========================================================= */
.sidebar-toggle-btn {
  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 10px;
  background: rgba(0, 0, 0, 0.05);
}

/* =========================================================
   FLEX SPACER
========================================================= */
.flex-1-auto {
  flex: 1;
}

/* =========================================================
   LANGUAGE SWITCHER
========================================================= */
.language-switcher {
  display: flex;
  align-items: center;

  background: #f5f5f5;
  border-radius: 30px;

  padding: 4px;
  border: 1px solid #ececec;

  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
}

.lang-option {
  border: none;
  background: transparent;

  padding: 8px 14px;
  border-radius: 25px;

  font-size: 13px;
  font-weight: 700;

  color: #666;
  cursor: pointer;

  display: flex;
  align-items: center;
  gap: 6px;

  transition: all 0.25s ease;
}

.lang-option:hover {
  color: #ff5a00;
}

.lang-option.active {
  background: #ff5a00;
  color: #fff;

  box-shadow: 0 2px 8px rgba(255, 90, 0, 0.3);
}

/* =========================================================
   PROFILE BUTTON
========================================================= */
.rounded-pill {
  background: transparent !important;
  box-shadow: none !important;
  padding: 0;
}

.rounded-circle {
  border-radius: 50%;
  border: 2px solid #ff5a00;
  object-fit: cover;
}

/* =========================================================
   ICONS
========================================================= */
.topbar i-tabler {
  transition: 0.2s;
}

.topbar i-tabler:hover {
  color: #ff5a00;
}

/* =========================================================
   BADGE (NOTIFICATIONS)
========================================================= */
::ng-deep .mat-badge-content {
  background: #ff5a00;
  font-weight: 700;
}

/* =========================================================
   MENUS
========================================================= */
.notification-menu,
.topbar-dd {
  border-radius: 12px;
  padding: 6px;
}

/* =========================================================
   LOGOUT BUTTON
========================================================= */
.p-x-12 button {
  width: 100%;
  border-radius: 10px;

  border: 1px solid #ff5a00 !important;
  color: #ff5a00 !important;

  font-weight: 600;
  transition: 0.2s;
}

.p-x-12 button:hover {
  background: #ff5a00 !important;
  color: #fff !important;
}

/* =========================================================
   RESPONSIVE
========================================================= */
@media (max-width: 768px) {

  .language-switcher {
    margin-right: 6px;
  }

  .lang-option {
    padding: 7px 10px;
    font-size: 12px;
  }

  .topbar {
    padding: 0 10px;
  }
}
</style>

<mat-toolbar class="topbar">

  <!-- ================= MOBILE MENU ================= -->
  <button
    *ngIf="isOver"
    mat-icon-button
    (click)="drawer.toggle()"
    class="sidebar-toggle-btn">

    <i-tabler name="menu-2"></i-tabler>
  </button>

  <!-- ================= NOTIFICATIONS ================= -->
  <button
    *ngIf="getCurrentUser() as user"
    mat-icon-button
    [matMenuTriggerFor]="notificationMenu"
    (click)="onBellClick()">

    <i-tabler
      name="bell"
      [matBadge]="unreadCount > 0 ? unreadCount : null"
      matBadgeColor="warn">
    </i-tabler>

  </button>

  <!-- ================= NOTIFICATION MENU ================= -->
  <mat-menu #notificationMenu="matMenu">

    <button mat-menu-item disabled *ngIf="notifications.length === 0">
      🔔 {{ 'TOPBAR.NO_NOTIFICATIONS' | translate }}
    </button>

    <button mat-menu-item *ngIf="notifications.length > 0">
      Mark all as read ({{ unreadCount }})
    </button>

    <mat-divider *ngIf="notifications.length > 0"></mat-divider>

    <button mat-menu-item *ngFor="let n of notifications">
      {{ n.message }}
    </button>

  </mat-menu>

  <span class="flex-1-auto"></span>

  <!-- ================= LANGUAGE SWITCH ================= -->
  <div class="language-switcher">

    <button
      class="lang-option"
      [class.active]="currentLang === 'en'"
      (click)="changeLanguage('en')">

      🇺🇸 EN
    </button>

    <button
      class="lang-option"
      [class.active]="currentLang === 'ar'"
      (click)="changeLanguage('ar')">

      🇪🇬 AR
    </button>

  </div>

  <!-- ================= PROFILE ================= -->
  <ng-container *ngIf="getCurrentUser() as user">

    <button
      mat-mini-fab
      class="rounded-pill"
      [matMenuTriggerFor]="profilemenu">

      <img
        src="/assets/images/profile/user-1.jpg"
        width="35"
        class="rounded-circle" />
    </button>

    <mat-menu #profilemenu="matMenu">

      <button mat-menu-item (click)="editProfile()">
        <i-tabler name="user"></i-tabler>
               <span>{{ 'TOPBAR.EDIT_PROFILE' | translate }}</span>
      </button>

      <div class="p-x-12 m-t-12">
        <button mat-stroked-button class="w-100" (click)="logout()">
          {{ 'TOPBAR.LOGOUT' | translate }}
        </button>
      </div>

    </mat-menu>

  </ng-container>

</mat-toolbar>
