<style>
  /* =========================
   TOPBAR (Talabat Style)
========================= */
  .topbar {
    background: #ffffff;
    height: 64px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    position: sticky;
    top: 0;
    z-index: 1000;
    gap: 10px;
  }
/* =========================
   Language Switcher
========================= */

.language-switcher {
  display: flex;
  align-items: center;
  background: #f5f5f5;
  border-radius: 30px;
  padding: 4px;
  border: 1px solid #ececec;
  margin-right: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.lang-option {
  border: none;
  background: transparent;
  color: #666;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 25px;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all .25s ease;
}

.lang-option:hover {
  color: #ff5a00;
}

.lang-option.active {
  background: #ff5a00;
  color: white;
  box-shadow: 0 2px 8px rgba(255,90,0,.3);
}

.flag {
  font-size: 15px;
}

/* Mobile */
@media (max-width: 768px) {
  .language-switcher {
    margin-right: 6px;
  }

  .lang-option {
    padding: 7px 10px;
    font-size: 12px;
  }

  .flag {
    display: none;
  }
}
  /* Mobile menu button */
  .topbar button mat-icon,
  .topbar i-tabler {
    color: #333;
    transition: 0.2s;
  }

  .topbar button:hover i-tabler {
    color: #ff5a00;
  }

  /* Spacer */
  .flex-1-auto {
    flex: 1;
  }

  /* Profile button */
  .rounded-pill {
    background: transparent !important;
    box-shadow: none !important;
    padding: 0;
  }

  /* Avatar */
  .rounded-circle {
    border-radius: 50%;
    border: 2px solid #ff5a00;
    object-fit: cover;
  }

  /* Notification badge */
  ::ng-deep .mat-badge-content {
    background: #ff5a00;
    font-weight: 700;
  }

  /* Menus */
  .notification-menu,
  .topbar-dd {
    border-radius: 12px;
    padding: 6px;
  }

  /* Notification text */
  .text-muted {
    font-size: 13px;
    color: #666;
  }

  /* Logout container */
  .p-x-12 {
    padding: 10px;
  }

  /* Logout button */
  .p-x-12 button {
    width: 100%;
    border-radius: 10px;
    border: 1px solid #ff5a00 !important;
    color: #ff5a00 !important;
    font-weight: 600;
    transition: 0.2s;
  }

  .p-x-12 button:hover {
    background: #ff5a00 !important;
    color: #fff !important;
  }

  /* Hover effect for icons */
  mat-toolbar i-tabler {
    transition: 0.2s;
  }

  mat-toolbar i-tabler:hover {
    color: #ff5a00;
  }
</style>


<mat-toolbar class="topbar">

  <!-- Mobile Menu -->


<button mat-icon-button
        (click)="drawer.toggle()"
        class="d-flex d-md-none justify-content-center">
  <i-tabler name="menu-2"></i-tabler>
</button>

  <!-- 🔔 NOTIFICATION (ONLY LOGGED IN) -->
  <button *ngIf="getCurrentUser() as user"
          mat-icon-button
          [matMenuTriggerFor]="notificationMenu"
          aria-label="Notifications"
          (click)="onBellClick()">

    <i-tabler name="bell"
              class="d-flex"
              [matBadge]="unreadCount > 0 ? unreadCount : null"
              matBadgeColor="warn">
    </i-tabler>

  </button>

  <!-- Notifications Menu -->
  <mat-menu #notificationMenu="matMenu" class="notification-menu">

    <button mat-menu-item disabled *ngIf="notifications.length === 0">
      🔔 {{ 'TOPBAR.NO_NOTIFICATIONS' | translate }}
    </button>

    <button mat-menu-item *ngIf="notifications.length > 0">
      ✅ {{ 'TOPBAR.MARK_ALL_READ' | translate }} ({{ unreadCount }})
    </button>

    <mat-divider *ngIf="notifications.length > 0"></mat-divider>

    <button mat-menu-item *ngFor="let notification of notifications">
      <div class="d-flex flex-column">
        <small class="text-muted">
          {{ notification.message }}
        </small>
      </div>
    </button>

  </mat-menu>

  <span class="flex-1-auto"></span>

  <!-- LANGUAGE (ALWAYS SHOWN) -->
  <div class="language-switcher">

    <button class="lang-option"
            [class.active]="currentLang === 'en'"
            (click)="changeLanguage('en')">
      <span class="flag">🇺🇸</span>
      {{ 'TOPBAR.ENGLISH' | translate }}
    </button>

    <button class="lang-option"
            [class.active]="currentLang === 'ar'"
            (click)="changeLanguage('ar')">
      <span class="flag">🇪🇬</span>
      {{ 'TOPBAR.ARABIC' | translate }}
    </button>

  </div>

  <!-- 👤 PROFILE (ONLY LOGGED IN) -->
  <ng-container *ngIf="getCurrentUser() as user">

    <button class="rounded-pill"
            mat-mini-fab
            [matMenuTriggerFor]="profilemenu">

      <img src="/assets/images/profile/user-1.jpg"
           class="rounded-circle object-cover d-block"
           width="35" />

    </button>

    <!-- Profile Menu -->
    <mat-menu #profilemenu="matMenu"
              class="cardWithShadow topbar-dd"
              xPosition="before">

      <button mat-menu-item (click)="editProfile()">
        <i-tabler name="user" class="icon-18"></i-tabler>
        <span>{{ 'TOPBAR.EDIT_PROFILE' | translate }}</span>
      </button>

     
    <button mat-menu-item>
        <i-tabler name="mail" class="icon-18"></i-tabler>
        <span>{{ 'TOPBAR.MY_ACCOUNT' | translate }}</span>
      </button>
    <!--
      <button mat-menu-item>
        <i-tabler name="list-check" class="icon-18"></i-tabler>
        <span>{{ 'TOPBAR.MY_TASKS' | translate }}</span>
      </button> -->

      <div class="p-x-12 m-t-12">
        <button mat-stroked-button class="w-100" (click)="logout()">
          {{ 'TOPBAR.LOGOUT' | translate }}
        </button>
      </div>

    </mat-menu>

  </ng-container>

</mat-toolbar>
