<div class="home-container">

  <!-- Welcome -->
  <section class="welcome-card">

    <div class="welcome-icon">
      🍽️
    </div>

    <h1>{{ 'HOME.RESTAURANT_NAME' | translate }}</h1>

    <h2>{{ 'HOME.WELCOME_MESSAGE' | translate }}</h2>

    <p>{{ 'HOME.SUBTITLE' | translate }}</p>

  </section>

  <!-- Popular Menu -->
  <section class="slider-container">

    <div class="section-header">
      <h2>{{ 'HOME.POPULAR_MENU' | translate }}</h2>
      <p>{{ 'HOME.POPULAR_MENU_SUBTITLE' | translate }}</p>
    </div>
    <div class="slider">


      <div class="card" *ngFor="let item of topOrderedItems"
     (click)="goToMenu(item.menuItemID)">

  <div class="image-wrapper">
    <img [src]="item.imageUrl" [alt]="item.name">

    <span class="price">
      {{ item.sell_price }} {{ 'COMMON.CURRENCY' | translate }}
    </span>
  </div>

  <div class="info">
    <h3>{{ item.name }}</h3>
  </div>

</div>

    </div>

  </section>

</div>
