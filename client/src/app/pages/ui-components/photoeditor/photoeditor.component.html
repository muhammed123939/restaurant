<div class="talabat-upload-card">

  <!-- Hidden File Input -->
  <input
    #fileInput
    type="file"
    ng2FileSelect
    [uploader]="uploader"
    accept="image/*"
    hidden />

  <!-- Upload Area -->
  <div class="upload-area" (click)="fileInput.click()">

    <!-- Preview image (current or selected) -->
    <img
      *ngIf="previewUrl"
      [src]="previewUrl"
      class="preview-image" />

    <!-- Empty state -->
    <div *ngIf="!previewUrl" class="empty-state">
      <i class="fa fa-camera upload-icon"></i>

      <h5>
        {{ 'PHOTO_EDITOR.UPLOAD_ITEM_PHOTO' | translate }}
      </h5>

      <p>
        {{ 'PHOTO_EDITOR.FILE_TYPES' | translate }}
      </p>
    </div>

  </div>

  <!-- File Info -->
  <div *ngIf="uploader.queue.length > 0" class="file-info">

    <strong>{{ uploader.queue[0].file.name }}</strong>

    <small>
      {{ uploader.queue[0].file.size / 1024 / 1024 | number:'1.2-2' }} MB
    </small>

  </div>

  <!-- Action Buttons -->
  <div *ngIf="uploader.queue.length > 0" class="action-buttons">

    <button
      class="talabat-btn upload-btn"
      (click)="uploader.uploadAll()"
      [disabled]="uploader.getNotUploadedItems().length === 0">

      {{ 'PHOTO_EDITOR.UPLOAD_PHOTO' | translate }}

    </button>

    <button
      class="talabat-btn remove-btn"
      (click)="uploader.clearQueue(); previewUrl = null">

      {{ 'PHOTO_EDITOR.REMOVE' | translate }}

    </button>

  </div>

  <!-- Progress Bar -->
  <div *ngIf="uploader.progress > 0" class="progress-wrapper">

    <div
      class="progress-bar"
      [style.width.%]="uploader.progress">
    </div>

  </div>

</div>
