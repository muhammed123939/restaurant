<div class="page">

  <mat-card class="form-card">

    <mat-card-header class="header">
      <mat-card-title class="title">
        {{ 'TABLE_REGISTER.TITLE' | translate }}
      </mat-card-title>
    </mat-card-header>

    <mat-card-content class="content">

      <!-- Error -->
      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>

      <!-- Success -->
      <div *ngIf="successMessage" class="success-box">
        {{ successMessage }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="register()" class="form">

        <!-- Table Number -->
        <mat-form-field appearance="outline" class="field">
          <mat-label>
            {{ 'TABLE_REGISTER.TABLE_NUMBER' | translate }}
          </mat-label>

          <input
            matInput
            type="number"
            formControlName="tableNo"
            [placeholder]="'TABLE_REGISTER.TABLE_NUMBER_PLACEHOLDER' | translate" />

          <mat-error *ngIf="registerForm.get('tableNo')?.hasError('required')">
            {{ 'TABLE_REGISTER.TABLE_NUMBER_REQUIRED' | translate }}
          </mat-error>
        </mat-form-field>

        <!-- Capacity -->
        <mat-form-field appearance="outline" class="field">
          <mat-label>
            {{ 'TABLE_REGISTER.CAPACITY' | translate }}
          </mat-label>

          <input
            matInput
            type="number"
            formControlName="capacity"
            [placeholder]="'TABLE_REGISTER.CAPACITY_PLACEHOLDER' | translate" />

          <mat-error *ngIf="registerForm.get('capacity')?.hasError('required')">
            {{ 'TABLE_REGISTER.CAPACITY_REQUIRED' | translate }}
          </mat-error>
        </mat-form-field>

        <!-- Buttons -->
        <div class="actions">

          <button
            mat-raised-button
            class="save-btn"
            type="submit"
            [disabled]="registerForm.invalid">

            {{ 'TABLE_REGISTER.SAVE_TABLE' | translate }}

          </button>

          <button
            mat-stroked-button
            class="cancel-btn"
            type="button"
            routerLink="/ui-components/table-list">

            {{ 'TABLE_REGISTER.CANCEL' | translate }}

          </button>

        </div>

      </form>

    </mat-card-content>

  </mat-card>

</div>
